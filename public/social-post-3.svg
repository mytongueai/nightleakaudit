<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="grid3" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="rgba(0,232,122,0.04)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="amb3" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="rgba(0,232,122,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="tl3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="35%" stop-color="#00E87A" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#00E87A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="#080A09"/>
  <rect width="1080" height="1080" fill="url(#grid3)"/>
  <rect width="1080" height="1080" fill="url(#amb3)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#tl3)"/>

  <!-- Logo -->
  <circle cx="60" cy="60" r="6" fill="#00E87A" filter="url(#glow3)"/>
  <text x="76" y="67" font-family="'Courier New', monospace" font-size="14" fill="#00E87A" letter-spacing="3">NIGHTLEAK</text>
  <text x="1020" y="67" font-family="'Courier New', monospace" font-size="11" fill="#3A4A40" text-anchor="end" letter-spacing="2">POST 3 / 4</text>

  <!-- Eyebrow -->
  <text x="60" y="150" font-family="'Courier New', monospace" font-size="11" fill="#00E87A" letter-spacing="3">THE ORIGIN</text>

  <!-- Quote mark large -->
  <text x="52" y="260" font-family="Georgia, serif" font-size="160" fill="rgba(0,232,122,0.07)" font-weight="700">"</text>

  <!-- Quote text — tight, personal, punchy -->
  <text x="60" y="240" font-family="Georgia, serif" font-size="30" fill="#E8F0EB" font-style="italic" letter-spacing="-0.5">My father died at 62.</text>

  <text x="60" y="300" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">Sepsis. From infected root canals that went undetected for years.</text>
  <text x="60" y="332" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">He had Medicare.</text>
  <text x="60" y="364" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">His dentist wasn't enrolled.</text>

  <!-- divider -->
  <rect x="60" y="396" width="440" height="1" fill="#1A2420"/>

  <text x="60" y="436" font-family="Arial, sans-serif" font-size="20" fill="#E8F0EB">The connection between his mouth and his heart</text>
  <text x="60" y="464" font-family="Arial, sans-serif" font-size="20" fill="#E8F0EB">was never made.</text>
  <text x="60" y="500" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">Not clinically.</text>
  <text x="60" y="530" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">Not financially.</text>
  <text x="60" y="566" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">Not at all.</text>

  <!-- divider -->
  <rect x="60" y="598" width="960" height="1" fill="#1A2420"/>

  <text x="60" y="648" font-family="Arial, sans-serif" font-size="24" fill="#E8F0EB" font-weight="700">That gap cost him his life.</text>
  <text x="60" y="692" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">I'm building tools to close it. But first — every dentist needs to</text>
  <text x="60" y="720" font-family="Arial, sans-serif" font-size="20" fill="#7A9080">know this decision exists.</text>

  <!-- The three choices -->
  <rect x="60" y="766" width="960" height="64" rx="4" fill="#111814" stroke="#1A2420" stroke-width="1"/>
  <text x="270" y="792" font-family="'Courier New', monospace" font-size="13" fill="#00E87A" text-anchor="middle" letter-spacing="1">ENROLL</text>
  <text x="270" y="812" font-family="Arial, sans-serif" font-size="12" fill="#3A4A40" text-anchor="middle">Capture the revenue</text>
  <rect x="510" y="773" width="1" height="50" fill="#1A2420"/>
  <text x="540" y="792" font-family="'Courier New', monospace" font-size="13" fill="#F5A623" text-anchor="middle" letter-spacing="1">OPT OUT</text>
  <text x="540" y="812" font-family="Arial, sans-serif" font-size="12" fill="#3A4A40" text-anchor="middle">Stay fully private</text>
  <rect x="810" y="773" width="1" height="50" fill="#1A2420"/>
  <text x="930" y="800" font-family="'Courier New', monospace" font-size="12" fill="#FF4040" text-anchor="middle" letter-spacing="1">JUST DECIDE.</text>

  <!-- Attribution -->
  <rect x="60" y="870" width="440" height="70" rx="3" fill="#0F1511" stroke="#1A2420" stroke-width="1"/>
  <rect x="60" y="870" width="2" height="70" fill="#00E87A"/>
  <text x="82" y="900" font-family="Arial, sans-serif" font-size="15" fill="#E8F0EB" font-weight="700">Eric Morin</text>
  <text x="82" y="920" font-family="'Courier New', monospace" font-size="11" fill="#3A4A40" letter-spacing="0.5">Founder, NightLeak</text>

  <!-- Thesis -->
  <text x="60" y="990" font-family="Arial, sans-serif" font-size="18" fill="#E8F0EB" font-weight="700" font-style="italic">Health starts from the mouth.</text>

  <!-- Bottom -->
  <text x="60" y="1044" font-family="'Courier New', monospace" font-size="12" fill="#00E87A" letter-spacing="1">nightleakaudit.com/medicare</text>
  <text x="1020" y="1044" font-family="'Courier New', monospace" font-size="11" fill="#3A4A40" text-anchor="end">Free 10-min status review</text>
</svg>
